<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speedrun LSAT</title>
    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <header class="topbar">
      <div class="bar">
        <span class="appname">Speedrun <b>LSAT</b></span>
        <nav class="tabs">
          <button id="tab-study" class="tab active">Study</button>
          <button id="tab-dash" class="tab">Dashboard</button>
        </nav>
        <span id="authbar" class="authbar"></span>
      </div>
    </header>
    <main id="view"><p class="loading">Loading…</p></main>
    <footer>
      <p>
        Companion web view of the Speedrun LSAT deck. The shared Anki Rust engine
        runs in the desktop and Android apps; this site mirrors them and stores
        your study progress and scores per-user in Firestore. Readiness abstains
        until there is enough evidence (the give-up rule).
      </p>
    </footer>
    <script type="module" src="app.js?v=2"></script>
  </body>
</html>
